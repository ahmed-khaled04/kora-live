services:
  postgres:
    image: postgres:16
    container_name: kora_postgres
    environment:
      POSTGRES_USER: kora
      POSTGRES_PASSWORD: kora
      POSTGRES_DB: kora
    ports:
      - "5432:5432"
    volumes:
      - kora_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kora_redis
    ports:
      - "6379:6379"
    volumes:
      - kora_redis_data:/data

volumes:
  kora_postgres_data:
  kora_redis_data:
